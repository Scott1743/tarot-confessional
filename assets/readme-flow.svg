<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">森林密语使用与技术流程</title>
  <desc id="desc">从带着心事进入森林，到在本地抽三张牌、回到对话获得解读、生成可回看的阅读档案，并可选交给 MNEME 在本地整理。</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#55c4e8"/>
      <stop offset=".56" stop-color="#c9f1f5"/>
      <stop offset="1" stop-color="#fffdf2"/>
    </linearGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#b9ed74"/>
      <stop offset="1" stop-color="#76c958"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffef5"/>
      <stop offset="1" stop-color="#eef9dc"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1c6b55" flood-opacity=".15"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#2e8c62"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#sky)"/>

  <g fill="#fff" opacity=".86" stroke="#8ecfe2" stroke-width="2">
    <path d="M62 108c8-31 52-36 68-10 17-32 72-22 73 15 34-5 49 34 21 51H73c-30-9-35-45-11-56Z"/>
    <path d="M893 87c11-32 58-38 75-9 21-35 77-18 74 21 37-4 49 39 18 53H891c-29-11-29-50 2-65Z"/>
    <path d="M452 142c5-20 35-26 47-8 12-21 45-12 45 13 22-2 30 24 11 33h-98c-20-6-22-29-5-38Z" opacity=".72"/>
  </g>

  <path d="M0 474C165 404 287 446 429 420c152-28 252-12 382 26 154 45 258-10 389-44v358H0Z" fill="#dff5a7"/>
  <path d="M0 525c134-67 255-44 381-8 150 43 258-13 394-35 161-26 278 16 425 54v224H0Z" fill="url(#meadow)"/>
  <path d="M0 564c160-42 290-8 427 28 174 46 319-30 470-43 111-10 205 10 303 44v167H0Z" fill="#3f9c5d" opacity=".55"/>

  <g fill="#1f7253" opacity=".86">
    <path d="M38 505l22-50 22 50h-13l18 36H33l18-36Z"/>
    <path d="M106 486l17-40 17 40h-10l15 30h-44l14-30Z"/>
    <path d="M1102 470l24-56 24 56h-14l20 40h-60l20-40Z"/>
    <path d="M1048 495l18-43 18 43h-10l15 31h-46l15-31Z"/>
  </g>

  <g transform="translate(64 54)">
    <text x="0" y="0" fill="#17624f" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16" font-weight="700" letter-spacing="4">森林密语 · 如何工作</text>
    <text x="0" y="51" fill="#10483f" font-family="STKaiti, KaiTi, Songti SC, serif" font-size="42" font-weight="700">从一段心事，到一份可以回看的阅读</text>
    <text x="0" y="83" fill="#3f746c" font-family="PingFang SC, Hiragino Sans GB, sans-serif" font-size="16">直觉负责选择，代码守住真实，最后仍由你决定。</text>
  </g>

  <g fill="none" stroke="#2e8c62" stroke-width="3" stroke-linecap="round" opacity=".72" marker-end="url(#arrow)">
    <path d="M308 367C318 367 322 379 332 379"/>
    <path d="M576 379C586 379 590 355 600 355"/>
    <path d="M844 355C854 355 858 372 868 372"/>
  </g>

  <g font-family="PingFang SC, Hiragino Sans GB, sans-serif">
    <g transform="translate(64 214)" filter="url(#soft-shadow)">
      <rect width="244" height="324" rx="18" fill="url(#paper)"/>
      <circle cx="38" cy="38" r="21" fill="#f0ad4d"/>
      <text x="38" y="44" text-anchor="middle" fill="#164d40" font-size="14" font-weight="700">一</text>
      <path d="M174 29h38a12 12 0 0 1 12 12v24a12 12 0 0 1-12 12h-17l-12 12 2-12h-11a12 12 0 0 1-12-12V41a12 12 0 0 1 12-12Z" fill="#dff5fb" stroke="#318e73" stroke-width="2"/>
      <text x="28" y="113" fill="#10483f" font-family="STKaiti, KaiTi, Songti SC, serif" font-size="28" font-weight="700">带着心事来</text>
      <text x="28" y="157" fill="#47756d" font-size="16">不必先把一切想明白</text>
      <text x="28" y="187" fill="#47756d" font-size="16">也不必在页面里说出口</text>
      <path d="M28 231c35-22 67-22 101 0" fill="none" stroke="#8bcf62" stroke-width="3" stroke-linecap="round"/>
      <path d="M72 222c9-14 22-15 29-3-10 6-20 7-29 3Z" fill="#4d9b60"/>
      <text x="28" y="286" fill="#2c715e" font-size="14" font-weight="700">问题留在心里</text>
    </g>

    <g transform="translate(332 238)" filter="url(#soft-shadow)">
      <rect width="244" height="324" rx="18" fill="url(#paper)"/>
      <circle cx="38" cy="38" r="21" fill="#55bde0"/>
      <text x="38" y="44" text-anchor="middle" fill="#123f3a" font-size="14" font-weight="700">二</text>
      <g transform="translate(168 23)">
        <rect width="35" height="55" rx="5" fill="#246b55" transform="rotate(-8 17 27)"/>
        <rect x="22" y="2" width="35" height="55" rx="5" fill="#55a96b" transform="rotate(8 39 29)"/>
        <circle cx="39" cy="29" r="8" fill="none" stroke="#f7e58c" stroke-width="2"/>
      </g>
      <text x="28" y="113" fill="#10483f" font-family="STKaiti, KaiTi, Songti SC, serif" font-size="28" font-weight="700">凭直觉抽三张</text>
      <text x="28" y="157" fill="#47756d" font-size="16">完整牌组在浏览器里洗牌</text>
      <text x="28" y="187" fill="#47756d" font-size="16">正逆位与牌面由代码确定</text>
      <rect x="28" y="222" width="188" height="42" rx="8" fill="#e1f3cb"/>
      <text x="122" y="248" text-anchor="middle" fill="#23634f" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14">TC1 抽牌码</text>
      <text x="28" y="294" fill="#2c715e" font-size="14" font-weight="700">本地完成</text>
    </g>

    <g transform="translate(600 202)" filter="url(#soft-shadow)">
      <rect width="244" height="324" rx="18" fill="url(#paper)"/>
      <circle cx="38" cy="38" r="21" fill="#94d95c"/>
      <text x="38" y="44" text-anchor="middle" fill="#123f3a" font-size="14" font-weight="700">三</text>
      <g transform="translate(163 24)" fill="none" stroke="#2f8568" stroke-width="2">
        <path d="M8 4h46a10 10 0 0 1 10 10v24a10 10 0 0 1-10 10H30L17 60l3-12H8A10 10 0 0 1-2 38V14A10 10 0 0 1 8 4Z" fill="#dff5fb"/>
        <path d="M14 19h34M14 31h25"/>
      </g>
      <text x="28" y="113" fill="#10483f" font-family="STKaiti, KaiTi, Songti SC, serif" font-size="28" font-weight="700">回到对话</text>
      <text x="28" y="157" fill="#47756d" font-size="16">Agent 连接牌面与你的处境</text>
      <text x="28" y="187" fill="#47756d" font-size="16">把象征说成能理解的话</text>
      <rect x="28" y="222" width="188" height="42" rx="8" fill="#e6f6f8"/>
      <text x="122" y="248" text-anchor="middle" fill="#23634f" font-size="14">不预测，也不替你决定</text>
      <text x="28" y="294" fill="#2c715e" font-size="14" font-weight="700">温柔解读</text>
    </g>

    <g transform="translate(868 228)" filter="url(#soft-shadow)">
      <rect width="244" height="324" rx="18" fill="url(#paper)"/>
      <circle cx="38" cy="38" r="21" fill="#f0ad4d"/>
      <text x="38" y="44" text-anchor="middle" fill="#164d40" font-size="14" font-weight="700">四</text>
      <g transform="translate(174 19)">
        <path d="M0 0h42l15 15v50H0Z" fill="#e3f5cd" stroke="#318e73" stroke-width="2"/>
        <path d="M42 0v15h15M11 28h34M11 40h34M11 52h24" fill="none" stroke="#318e73" stroke-width="2"/>
      </g>
      <text x="28" y="113" fill="#10483f" font-family="STKaiti, KaiTi, Songti SC, serif" font-size="28" font-weight="700">留下阅读</text>
      <text x="28" y="157" fill="#47756d" font-size="16">生成可离线保存的阅读档案</text>
      <text x="28" y="187" fill="#47756d" font-size="16">带走一件能去做的小事</text>
      <rect x="28" y="222" width="188" height="42" rx="8" fill="#fff0cf"/>
      <text x="122" y="248" text-anchor="middle" fill="#23634f" font-size="14">可选交给 MNEME 整理</text>
      <text x="28" y="294" fill="#2c715e" font-size="14" font-weight="700">由你决定是否保存</text>
    </g>
  </g>

  <g transform="translate(64 622)" font-family="PingFang SC, Hiragino Sans GB, sans-serif">
    <rect width="1072" height="86" rx="18" fill="#155746" opacity=".96"/>
    <path d="M30 48c12-22 30-25 43-7-15 11-29 13-43 7Z" fill="#a9df69"/>
    <text x="92" y="34" fill="#dff5b5" font-size="14" font-weight="700" letter-spacing="2">隐私与边界</text>
    <text x="92" y="61" fill="#f5fff2" font-size="16">抽牌、TC1 编解码与校验由确定性脚本完成；只有你主动确认，MNEME 才会保存值得留下的内容。</text>
  </g>
</svg>
