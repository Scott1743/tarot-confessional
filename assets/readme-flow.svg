<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">塔罗树洞技术流程</title>
  <desc id="desc">用户对话经过 Agent 理解与选择牌阵，进入离线抽牌和解读页面，再由确定性脚本完成编码、解码与页面构建。</desc>
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#130b20"/>
      <stop offset=".52" stop-color="#241133"/>
      <stop offset="1" stop-color="#100919"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#392047" stop-opacity=".96"/>
      <stop offset="1" stop-color="#20112c" stop-opacity=".96"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#8d6831"/><stop offset=".48" stop-color="#e3c477"/><stop offset="1" stop-color="#8d6831"/>
    </linearGradient>
    <pattern id="stars" width="84" height="84" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1" fill="#ead99f" opacity=".28"/><circle cx="62" cy="34" r="1.3" fill="#ead99f" opacity=".2"/><circle cx="38" cy="72" r=".8" fill="#fff4c9" opacity=".22"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#07040b" flood-opacity=".55"/>
    </filter>
    <filter id="glow" x="-200%" y="-200%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#night)"/>
  <rect width="1200" height="760" rx="28" fill="url(#stars)"/>
  <path d="M0 604 Q210 528 410 620 T820 602 T1200 574 V760 H0Z" fill="#4d2b65" opacity=".25"/>
  <path d="M0 650 Q210 566 420 662 T830 640 T1200 618" fill="none" stroke="#b18a4b" stroke-opacity=".2"/>

  <g transform="translate(72 70)">
    <text x="0" y="0" fill="#e2c06a" font-family="Songti SC, STSong, serif" font-size="19" letter-spacing="6">塔 罗 树 洞 · 技 术 流 程</text>
    <text x="0" y="44" fill="#fff8e8" font-family="Songti SC, STSong, serif" font-size="40" font-weight="600">从一句心事，到一份可验证的解读</text>
    <line x1="0" y1="70" x2="1056" y2="70" stroke="url(#gold)" stroke-opacity=".55"/>
  </g>

  <!-- A single golden thread links every deterministic step. -->
  <path d="M174 262 C224 262 224 262 274 262 S414 262 464 262 S604 262 654 262 S794 262 844 262" fill="none" stroke="#d6b463" stroke-width="2" stroke-dasharray="5 10" opacity=".75"/>
  <g fill="#e6c979" filter="url(#glow)"><circle cx="174" cy="262" r="5"/><circle cx="464" cy="262" r="5"/><circle cx="754" cy="262" r="5"/><circle cx="1044" cy="262" r="5"/></g>

  <g font-family="PingFang SC, Noto Sans CJK SC, sans-serif">
    <g transform="translate(72 214)" filter="url(#shadow)">
      <rect width="204" height="330" rx="18" fill="url(#panel)" stroke="#8c6a38"/>
      <circle cx="102" cy="48" r="25" fill="#d7b665"/><text x="102" y="56" text-anchor="middle" fill="#211229" font-family="Georgia, serif" font-size="22">壹</text>
      <text x="102" y="112" text-anchor="middle" fill="#fff7e7" font-family="Songti SC, STSong, serif" font-size="26">用户对话</text>
      <line x1="38" y1="136" x2="166" y2="136" stroke="#9d7a42" opacity=".5"/>
      <text x="102" y="179" text-anchor="middle" fill="#cbbfd1" font-size="16">说出问题或心事</text>
      <text x="102" y="210" text-anchor="middle" fill="#cbbfd1" font-size="16">不要求隐私信息</text>
      <path d="M67 258 Q102 232 137 258 Q102 290 67 258Z" fill="none" stroke="#d7b665" opacity=".8"/><circle cx="102" cy="258" r="8" fill="#d7b665"/>
      <text x="102" y="305" text-anchor="middle" fill="#957fa0" font-size="13" letter-spacing="2">你的问题</text>
    </g>

    <g transform="translate(362 214)" filter="url(#shadow)">
      <rect width="204" height="330" rx="18" fill="url(#panel)" stroke="#8c6a38"/>
      <circle cx="102" cy="48" r="25" fill="#d7b665"/><text x="102" y="56" text-anchor="middle" fill="#211229" font-family="Georgia, serif" font-size="22">贰</text>
      <text x="102" y="112" text-anchor="middle" fill="#fff7e7" font-family="Songti SC, STSong, serif" font-size="26">Agent</text>
      <line x1="38" y1="136" x2="166" y2="136" stroke="#9d7a42" opacity=".5"/>
      <text x="102" y="179" text-anchor="middle" fill="#cbbfd1" font-size="16">理解问题 · 选择牌阵</text>
      <text x="102" y="210" text-anchor="middle" fill="#cbbfd1" font-size="16">连接牌意 · 生成解读</text>
      <g transform="translate(72 238) rotate(-8)"><rect width="38" height="58" rx="4" fill="#160c24" stroke="#d7b665"/><path d="M8 29h22M19 12v34" stroke="#d7b665" opacity=".65"/></g>
      <g transform="translate(95 236) rotate(8)"><rect width="38" height="58" rx="4" fill="#2b1538" stroke="#d7b665"/><circle cx="19" cy="29" r="9" fill="none" stroke="#d7b665" opacity=".7"/></g>
      <text x="102" y="305" text-anchor="middle" fill="#957fa0" font-size="13" letter-spacing="2">温和引导</text>
    </g>

    <g transform="translate(652 214)" filter="url(#shadow)">
      <rect width="204" height="330" rx="18" fill="url(#panel)" stroke="#8c6a38"/>
      <circle cx="102" cy="48" r="25" fill="#d7b665"/><text x="102" y="56" text-anchor="middle" fill="#211229" font-family="Georgia, serif" font-size="22">叁</text>
      <text x="102" y="112" text-anchor="middle" fill="#fff7e7" font-family="Songti SC, STSong, serif" font-size="26">离线页面</text>
      <line x1="38" y1="136" x2="166" y2="136" stroke="#9d7a42" opacity=".5"/>
      <text x="102" y="179" text-anchor="middle" fill="#cbbfd1" font-size="16">draw.html · 安全抽牌</text>
      <text x="102" y="210" text-anchor="middle" fill="#cbbfd1" font-size="16">reading.html · 解读报告</text>
      <rect x="61" y="238" width="82" height="51" rx="5" fill="#140b1d" stroke="#d7b665"/><circle cx="102" cy="263" r="10" fill="none" stroke="#d7b665"/><path d="M102 246v34M85 263h34" stroke="#d7b665" opacity=".55"/>
      <text x="102" y="305" text-anchor="middle" fill="#957fa0" font-size="13" letter-spacing="2">本地完成</text>
    </g>

    <g transform="translate(942 214)" filter="url(#shadow)">
      <rect width="204" height="330" rx="18" fill="url(#panel)" stroke="#8c6a38"/>
      <circle cx="102" cy="48" r="25" fill="#d7b665"/><text x="102" y="56" text-anchor="middle" fill="#211229" font-family="Georgia, serif" font-size="22">肆</text>
      <text x="102" y="112" text-anchor="middle" fill="#fff7e7" font-family="Songti SC, STSong, serif" font-size="26">确定性脚本</text>
      <line x1="38" y1="136" x2="166" y2="136" stroke="#9d7a42" opacity=".5"/>
      <text x="102" y="179" text-anchor="middle" fill="#cbbfd1" font-size="16">编码 · 解码 · 校验</text>
      <text x="102" y="210" text-anchor="middle" fill="#cbbfd1" font-size="16">构建自包含 HTML</text>
      <path d="M68 255h68M68 274h68" stroke="#d7b665" stroke-width="2"/><circle cx="82" cy="255" r="5" fill="#d7b665"/><circle cx="122" cy="274" r="5" fill="#d7b665"/>
      <text x="102" y="305" text-anchor="middle" fill="#957fa0" font-size="13" letter-spacing="2">可验证结果</text>
    </g>
  </g>

  <g transform="translate(72 604)" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">
    <rect width="1056" height="92" rx="16" fill="#130b1c" stroke="#725330" opacity=".94"/>
    <text x="32" y="37" fill="#d7b665" font-size="14" letter-spacing="3">隐私边界</text>
    <text x="32" y="65" fill="#d5cbd8" font-size="16">牌面与问题留在本地；随机抽牌与 TC1 校验由代码完成，Agent 不臆测结果。</text>
    <text x="1024" y="55" text-anchor="end" fill="#7f6988" font-family="Georgia, serif" font-size="14">LOCAL · VERIFIABLE · PRIVATE</text>
  </g>
</svg>
