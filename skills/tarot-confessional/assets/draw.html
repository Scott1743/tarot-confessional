<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>森林密语 · 林间抽牌</title>
  <style>
    :root {
      --night: #12091d;
      --ink-purple: #21102f;
      --imperial: #54266f;
      --glow: #a65bd0;
      --blue: #416a86;
      --cinnabar: #a94b52;
      --gold: #d6b36a;
      --gold-light: #ead096;
      --gold-glow: rgba(214, 179, 106, 0.45);
      --moon: #eee8f2;
      --muted: #b8a9c2;
      --card-w: clamp(76px, 9vw, 124px);
      --card-r: 12px;
      --btn-r: 20px;
      --ease: cubic-bezier(.16, 1, .3, 1);
      --px: 0;
      --py: 0;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--night); }
    body { margin: 0; min-height: 100dvh; overflow-x: hidden; color: var(--moon); background: transparent; font-family: "STKaiti", "KaiTi", "STSong", serif; }
    button { font: inherit; }
    [hidden] { display: none !important; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    .sky,
    .silk-veil,
    #starfield,
    .vignette,
    .wave-1,
    .wave-2,
    .wave-3 { position: fixed; inset: 0; pointer-events: none; will-change: transform, opacity; backface-visibility: hidden; }

    .sky {
      z-index: 1;
      inset: -8%;
      background: url("images/eastern-night-bg_001.jpg") center / cover no-repeat;
      transform: translate3d(calc(var(--px) * -6px), calc(var(--py) * -4px), 0) scale(1.08);
      transition: transform 1.8s var(--ease), filter 1.2s ease;
    }

    .silk-veil {
      z-index: 2;
      inset: -20% -12%;
      opacity: .38;
      background: url("images/purple-silk.jpg") center / 620px repeat;
      mix-blend-mode: screen;
      animation: veil-drift 30s ease-in-out infinite alternate;
    }

    .wave-1 {
      z-index: 3;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgb(166 91 208 / .22), transparent 60%),
        radial-gradient(ellipse 50% 45% at 80% 70%, rgb(214 179 106 / .14), transparent 55%);
      animation: wave-slow 16s ease-in-out infinite;
    }
    .wave-2 {
      z-index: 3;
      background:
        radial-gradient(ellipse 45% 35% at 70% 25%, rgb(65 106 134 / .18), transparent 60%),
        radial-gradient(ellipse 55% 40% at 30% 75%, rgb(166 91 208 / .16), transparent 55%);
      animation: wave-mid 22s ease-in-out infinite;
    }
    .wave-3 {
      z-index: 3;
      background:
        radial-gradient(ellipse 70% 50% at 50% 50%, rgb(214 179 106 / .08), transparent 65%);
      animation: wave-gentle 28s ease-in-out infinite;
    }

    #starfield { z-index: 4; width: 100%; height: 100%; opacity: .6; }
    .vignette { z-index: 5; background: radial-gradient(ellipse at center, transparent 40%, rgb(10 5 18 / .45) 100%); }

    @keyframes sky-drift { from { transform: translate3d(calc(var(--px) * -6px), calc(var(--py) * -4px), 0) scale(1.06); } to { transform: translate3d(calc(var(--px) * -6px + 2%), calc(var(--py) * -4px - 1.5%), 0) scale(1.12); } }
    @keyframes veil-drift { from { transform: translate3d(-3%, -2%, 0) rotate(-1deg); } to { transform: translate3d(3%, 2%, 0) rotate(1deg); } }
    @keyframes wave-slow {
      0%, 100% { opacity: .7; transform: translate(0, 0) scale(1); }
      33% { opacity: 1; transform: translate(3%, -2%) scale(1.04); }
      66% { opacity: .8; transform: translate(-2%, 3%) scale(.98); }
    }
    @keyframes wave-mid {
      0%, 100% { opacity: .6; transform: translate(-2%, 2%) scale(.96); }
      50% { opacity: .9; transform: translate(2%, -3%) scale(1.03); }
    }
    @keyframes wave-gentle {
      0%, 100% { opacity: .5; transform: scale(1); }
      50% { opacity: .85; transform: scale(1.06); }
    }

    body.is-shuffling .sky { filter: saturate(1.1) brightness(1.03); }
    body.is-shuffling .silk-veil { animation-duration: 10s; opacity: .42; }
    body.is-shuffling .wave-1 { animation-duration: 7s; opacity: .9; }
    body.is-shuffling .wave-2 { animation-duration: 9s; opacity: .85; }
    body.is-shuffling .wave-3 { animation-duration: 11s; opacity: .8; }
    body.is-shuffling #starfield { opacity: .7; }

    .shell { position: relative; z-index: 10; width: min(1280px, calc(100% - 44px)); min-height: 100dvh; margin: 0 auto; display: grid; grid-template-rows: auto 1fr auto; padding: 28px 0 max(28px, env(safe-area-inset-bottom)); gap: 20px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; min-height: 46px; border-bottom: 1px solid rgb(214 179 106 / .28); color: var(--muted); font-family: "STKaiti", "KaiTi", serif; font-size: 13px; }
    .brand { color: var(--gold); letter-spacing: .2em; }
    .status { display: flex; align-items: center; gap: 10px; }
    .status::before { content: ""; width: 20px; height: 1px; background: var(--gold); transform-origin: right; animation: pulse-line 3s ease-in-out infinite; }
    @keyframes pulse-line { 50% { transform: scaleX(.45); opacity: .45; } }

    .scene { position: relative; display: grid; grid-template-columns: 104px minmax(0, 1fr) 104px; align-items: center; gap: 26px; padding: 22px 0 12px; perspective: 1200px; }
    .title-column { align-self: stretch; display: flex; justify-content: center; padding-top: 24px; }
    h1 { margin: 0; writing-mode: vertical-rl; font-size: clamp(32px, 4vw, 56px); font-weight: 400; line-height: 1.2; letter-spacing: .12em; text-shadow: 0 8px 30px rgb(112 50 143 / .34); }
    .seal { align-self: start; justify-self: center; margin-top: 34px; width: 68px; min-height: 94px; display: grid; place-items: center; padding: 10px 8px; border: 1px solid rgb(214 179 106 / .62); border-radius: 8px; color: var(--gold); background: rgb(55 19 72 / .4); font-family: "STKaiti", "KaiTi", serif; font-size: 12px; line-height: 1.7; text-align: center; box-shadow: inset 0 0 0 4px rgb(214 179 106 / .08), 0 8px 24px rgb(5 1 10 / .3); transition: box-shadow .4s ease, transform .4s var(--ease); }
    .seal:hover { transform: translateY(-2px); box-shadow: inset 0 0 0 4px rgb(214 179 106 / .12), 0 12px 32px rgb(5 1 10 / .4); }

    .ritual { min-width: 0; display: grid; grid-template-rows: minmax(218px, .7fr) auto auto; gap: 20px; align-items: center; }
    .table { position: relative; min-height: 230px; display: grid; place-items: center; transform: translate3d(calc(var(--px) * 5px), calc(var(--py) * 3px), 0); transition: transform 1s var(--ease); }
    .table::before { content: ""; position: absolute; width: min(720px, 78vw); aspect-ratio: 2.8 / 1; border: 1px solid rgb(214 179 106 / .28); border-radius: 50%; transform: perspective(850px) rotateX(68deg); box-shadow: inset 0 0 80px rgb(166 91 208 / .12), 0 0 46px rgb(84 38 111 / .18); }
    .table::after { content: ""; position: absolute; width: min(440px, 54vw); height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: .56; }

    .deck-stack { position: relative; width: var(--card-w); aspect-ratio: 2 / 3; border: 0; padding: 0; background: transparent; cursor: pointer; transform-style: preserve-3d; animation: deck-breathe 4.6s ease-in-out infinite; border-radius: var(--card-r); }
    .deck-stack::before, .deck-stack::after { content: ""; position: absolute; inset: 0; border: 1px solid rgb(214 179 106 / .38); background: #140b20; border-radius: var(--card-r); }
    .deck-stack::before { transform: translate(-8px, 6px) rotate(-3deg); }
    .deck-stack::after { transform: translate(8px, 5px) rotate(2.4deg); }
    .deck-stack img { position: relative; z-index: 2; display: block; width: 100%; height: 100%; object-fit: cover; border: 1px solid var(--gold); border-radius: var(--card-r); box-shadow: 0 26px 68px rgb(4 1 8 / .66), 0 0 30px rgb(166 91 208 / .2), 0 0 60px rgb(214 179 106 / .12); transition: box-shadow .4s var(--ease), transform .4s var(--ease); }
    .deck-stack:hover img { box-shadow: 0 32px 80px rgb(4 1 8 / .72), 0 0 40px rgb(166 91 208 / .32), 0 0 80px rgb(214 179 106 / .2); }
    .deck-stack::before { border-radius: var(--card-r); }
    .deck-stack::after { border-radius: var(--card-r); }
    @keyframes deck-breathe { 0%, 100% { transform: translateY(0) rotateX(0deg); } 50% { transform: translateY(-8px) rotateX(2deg); } }
    .deck-stack.is-shuffling { animation: shuffle 1.55s var(--ease) both; }
    @keyframes shuffle { 0% { transform: translateX(0) rotate(0) scale(1); } 18% { transform: translateX(-84%) rotate(-11deg) scale(1.06); } 36% { transform: translateX(72%) rotate(9deg) scale(.98); } 56% { transform: translateX(-48%) rotate(-6deg) scale(1.08); } 76% { transform: translateX(26%) rotate(3deg); } 100% { transform: translateX(0) rotate(0) scale(1); } }

    .deck-rail { position: relative; z-index: 3; width: min(100%, 970px); height: clamp(170px, 18vw, 210px); display: none; touch-action: pan-y; isolation: isolate; }
    .deck-rail.is-visible { display: block; animation: fan-open .75s var(--ease) both; }
    @keyframes fan-open { from { opacity: 0; transform: scale(.78) translateY(24px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .draw-card { --fan-x: 0px; --fan-y: 0px; --fan-angle: 0deg; --focus-x: 0px; --lift: 0px; --fan-scale: 1; position: absolute; left: 50%; bottom: 8px; width: clamp(64px, 7.4vw, 90px); aspect-ratio: 2 / 3; min-width: 0; border: 1px solid rgb(214 179 106 / .45); border-radius: var(--card-r); padding: 0; background: #160c24 url("images/card-back.jpg") center / cover; box-shadow: 0 16px 36px rgb(5 1 10 / .42), 0 0 14px rgb(214 179 106 / .05); cursor: pointer; transform: translateX(calc(-50% + var(--fan-x) + var(--focus-x))) translateY(calc(var(--fan-y) - var(--lift))) rotate(var(--fan-angle)) scale(var(--fan-scale)); transform-origin: 50% 115%; transform-style: preserve-3d; transition: transform .34s var(--ease), opacity .25s ease, box-shadow .34s var(--ease), border-color .25s ease; will-change: transform; }
    .draw-card::before { content: ""; position: absolute; inset: 6px; border: 1px solid rgb(238 232 242 / .2); border-radius: calc(var(--card-r) - 4px); pointer-events: none; transition: border-color .3s ease; }
    .draw-card.is-near { box-shadow: 0 22px 48px rgb(5 1 10 / .5), 0 0 22px rgb(166 91 208 / .12); }
    .draw-card.is-active { border-color: rgb(234 208 150 / .9); box-shadow: 0 34px 72px rgb(5 1 10 / .66), 0 0 34px rgb(214 179 106 / .34), 0 0 64px rgb(166 91 208 / .2); }
    .draw-card.is-active::before { border-color: rgb(234 208 150 / .68); }
    .draw-card.is-selected::before { border-color: rgb(214 179 106 / .72); }
    .draw-card.is-used { opacity: 0; pointer-events: none; }

    .positions { position: relative; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: clamp(12px, 4vw, 58px); width: min(760px, 100%); margin: 0 auto; }
    .positions::before { content: ""; position: absolute; left: 10%; right: 10%; top: 52%; height: 1px; background: linear-gradient(90deg, transparent, rgb(214 179 106 / .62), transparent); opacity: .42; }
    .position { position: relative; text-align: center; }
    .position:nth-child(2) { transform: translateY(12px); }
    .position-label { display: inline-block; min-height: 36px; margin-bottom: 12px; padding: 4px 14px; border-radius: 12px; color: var(--gold); background: rgb(18 9 29 / .55); backdrop-filter: blur(6px); font-family: "STKaiti", "KaiTi", serif; font-size: 17px; letter-spacing: .06em; text-shadow: 0 0 14px rgb(214 179 106 / .35); box-shadow: 0 2px 12px rgb(5 1 10 / .3); }
    .slot { position: relative; width: min(100%, 142px); aspect-ratio: 2 / 3; margin: 0 auto; border: 1px solid rgb(214 179 106 / .24); border-radius: var(--card-r); background: rgb(25 10 39 / .28); box-shadow: inset 0 0 36px rgb(166 91 208 / .06); transition: box-shadow .4s ease, border-color .4s ease; }
    .slot::after { content: ""; position: absolute; inset: 7px; border: 1px solid rgb(214 179 106 / .14); border-radius: calc(var(--card-r) - 5px); }
    .slot-card { position: absolute; inset: 0; overflow: hidden; border: 1px solid var(--gold); border-radius: var(--card-r); background: #160c24; box-shadow: 0 22px 52px rgb(5 1 10 / .5), 0 0 28px rgb(214 179 106 / .12); animation: settle .72s var(--ease) both; transform-style: preserve-3d; }
    .slot-card::before { content: ""; position: absolute; inset: 0; border-radius: var(--card-r); background: linear-gradient(135deg, rgb(214 179 106 / 0), rgb(214 179 106 / .18), rgb(166 91 208 / 0)); opacity: 0; transition: opacity .5s ease; z-index: 2; pointer-events: none; }
    .slot-card::after { content: ""; position: absolute; inset: -20%; border: 1px solid rgb(214 179 106 / .5); border-radius: var(--card-r); opacity: 0; animation: reveal-ring 1.6s .22s var(--ease); }
    .slot-card:hover::before { opacity: 1; }
    @keyframes settle { from { opacity: 0; transform: translateY(-36px) rotateY(110deg) scale(.88); } to { opacity: 1; transform: translateY(0) rotateY(0) scale(1); } }
    @keyframes reveal-ring { 0% { opacity: .9; transform: scale(.5); } 60% { opacity: .5; } 100% { opacity: 0; transform: scale(1.55); } }
    .slot-card img { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: calc(var(--card-r) - 1px); }
    .slot-card.is-reversed img { transform: rotate(180deg); }
    .card-caption { min-height: 42px; padding-top: 9px; font-size: 15px; }
    .card-caption span { display: block; color: var(--gold); font-family: "STKaiti", "KaiTi", serif; font-size: 11px; }

    .actions { display: grid; justify-items: center; gap: 16px; min-height: 110px; padding-top: 8px; }
    .command, .quiet-command { position: relative; min-height: 48px; cursor: pointer; transition: transform .28s var(--ease), background .3s ease, color .3s ease, box-shadow .3s ease; overflow: hidden; font-size: 15px; letter-spacing: .05em; }
    .command { min-width: 200px; border: 1px solid var(--gold); border-radius: var(--btn-r); padding: 13px 36px; color: #201126; background: var(--gold); box-shadow: 0 12px 30px rgb(5 1 10 / .3), 0 0 20px rgb(214 179 106 / .12); font-weight: 500; }
    .command::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgb(255 255 255 / .6), transparent);
      transform: skewX(-20deg);
      animation: btn-shine 3s ease-in-out infinite;
    }
    .command::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: calc(var(--btn-r) + 2px);
      background: linear-gradient(45deg, var(--gold), rgb(166 91 208 / .6), var(--gold), rgb(65 106 134 / .6), var(--gold));
      background-size: 300% 300%;
      z-index: -1;
      opacity: 0;
      transition: opacity .4s ease;
      animation: border-glow 4s linear infinite;
    }
    .command:hover { transform: translateY(-3px); background: var(--gold-light); box-shadow: 0 18px 40px rgb(5 1 10 / .38), 0 0 32px rgb(214 179 106 / .22); }
    .command:hover::after { opacity: 1; }
    .command:active { transform: translateY(-1px); }
    .command:disabled { cursor: not-allowed; opacity: .46; transform: none; box-shadow: none; }
    .command:disabled::before, .command:disabled::after { animation: none; display: none; }
    .quiet-command { border: 0; border-radius: calc(var(--btn-r) - 4px); padding: 10px 20px; color: var(--muted); background: transparent; font-size: 13px; }
    .quiet-command:hover { color: var(--moon); background: rgb(214 179 106 / .06); }
    .deck-stack:focus-visible, .draw-card:focus-visible, .command:focus-visible, .quiet-command:focus-visible { outline: 2px solid var(--gold); outline-offset: 5px; }
    @keyframes btn-shine { 0% { left: -100%; } 50%, 100% { left: 100%; } }
    @keyframes border-glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .code-panel { display: none; width: min(620px, 100%); margin-top: 8px; padding: 24px 28px; border: 1px solid rgb(214 179 106 / .58); border-radius: calc(var(--btn-r) + 4px); background: rgb(31 13 45 / .82); box-shadow: inset 0 0 40px rgb(166 91 208 / .08), 0 24px 60px rgb(5 1 10 / .45); text-align: center; }
    .code-panel.is-visible { display: grid; gap: 12px; animation: code-arrive .7s var(--ease); }
    @keyframes code-arrive { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .code-label { color: var(--gold); font-size: 20px; letter-spacing: .08em; text-shadow: 0 0 16px rgb(214 179 106 / .3); }
    .code-note { color: #e2d8ea; font-size: 17px; line-height: 1.7; }
    .draw-code { width: 100%; border: 0; padding: 8px 0; color: var(--moon); background: transparent; font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; font-size: clamp(15px, 2.5vw, 22px); text-align: center; letter-spacing: .08em; }
    .footer { display: flex; justify-content: space-between; gap: 16px; padding-top: 13px; border-top: 1px solid rgb(214 179 106 / .2); color: #9c8ca8; font-size: 11px; }

    @media (max-width: 760px) {
      :root { --card-w: 92px; }
      .shell { width: min(100% - 26px, 640px); padding-top: 10px; }
      .scene { grid-template-columns: 1fr; gap: 10px; padding-top: 15px; }
      .title-column { justify-content: flex-start; padding: 0; }
      h1 { writing-mode: horizontal-tb; font-size: clamp(29px, 8vw, 42px); letter-spacing: .04em; }
      .seal { position: absolute; top: 15px; right: 0; width: 54px; min-height: 64px; margin: 0; padding: 6px; font-size: 10px; }
      .ritual { grid-template-rows: minmax(178px, auto) auto auto; }
      .table { min-height: 190px; }
      .deck-rail { width: calc(100vw - 26px); height: 168px; }
      .draw-card { width: clamp(54px, 16vw, 66px); bottom: 5px; }
      .positions { gap: 7px; }
      .position:nth-child(2) { transform: translateY(8px); }
      .position-label { font-size: 14px; padding: 3px 10px; }
      .slot { width: min(100%, 96px); }
      .card-caption { min-height: 49px; font-size: 13px; }
      .footer { display: block; }
      .footer span:last-child { display: block; margin-top: 5px; }
    }

    /* Forest Whispers theme: preserve the draw mechanics, replace the ritual language. */
    :root { --night:#082a25; --ink-purple:#123d32; --imperial:#315f43; --glow:#7daa60; --blue:#6f9d8b; --cinnabar:#d49a43; --gold:#efbd50; --gold-light:#f8d978; --gold-glow:rgba(239,189,80,.34); --moon:#f4f1df; --muted:#c7d5c8; }
    body { font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; }
    .sky { inset:-3%; background-image:linear-gradient(180deg,rgb(5 39 34/.38),rgb(4 31 27/.72)),url("images/forest-whisper-bg.jpg"); filter:saturate(.78) brightness(.7); animation:forest-breathe 18s ease-in-out infinite alternate; }
    .silk-veil { display:none; }
    .wave-1 { background:radial-gradient(ellipse 62% 40% at 50% 72%,rgb(239 189 80/.13),transparent 68%); }
    .wave-2 { background:linear-gradient(180deg,rgb(8 42 37/.02),rgb(8 42 37/.34)); }
    .wave-3 { background:radial-gradient(ellipse 70% 65% at 50% 50%,transparent 28%,rgb(3 26 22/.28) 100%); }
    #starfield { opacity:.3; }
    .vignette { background:radial-gradient(ellipse at center,transparent 32%,rgb(3 28 24/.5) 100%); }
    body.is-shuffling .sky { filter:saturate(.92) brightness(.76); }
    .shell { width:min(1180px,calc(100% - 44px)); padding-top:20px; }
    .topbar { border-color:rgb(239 189 80/.28); color:rgb(229 236 218/.78); }
    .brand { color:#fff0b0; letter-spacing:.12em; font-size:15px; }
    .status::before { background:var(--gold); }
    .scene { grid-template-columns:1fr; grid-template-rows:auto 1fr; gap:6px; padding-top:4px; }
    .title-column { align-self:auto; justify-content:center; padding-top:0; text-align:center; }
    h1 { writing-mode:horizontal-tb; max-width:720px; font-size:clamp(30px,4vw,46px); line-height:1.15; letter-spacing:0; text-shadow:0 8px 28px rgb(2 25 21/.46); }
    .seal { position:absolute; top:2px; right:0; margin:0; border-color:rgb(239 189 80/.62); color:#ffdfa0; background:rgb(8 42 37/.58); box-shadow:inset 0 0 0 4px rgb(239 189 80/.07),0 8px 24px rgb(2 23 19/.28); }
    .ritual { grid-template-rows:minmax(150px,.55fr) auto auto; gap:8px; }
    .table { min-height:158px; }
    .table::before { border-color:rgb(239 189 80/.25); box-shadow:inset 0 0 80px rgb(87 142 91/.13),0 0 46px rgb(8 42 37/.18); }
    .deck-stack::before,.deck-stack::after { background:#0a302a; border-color:rgb(239 189 80/.38); }
    .deck-stack img { box-shadow:0 26px 68px rgb(2 24 20/.62),0 0 32px rgb(239 189 80/.15); }
    .draw-card { box-shadow:0 16px 36px rgb(2 24 20/.45),0 0 14px rgb(239 189 80/.06); }
    .draw-card.is-near { box-shadow:0 22px 48px rgb(2 24 20/.5),0 0 22px rgb(101 159 99/.18); }
    .draw-card.is-active { box-shadow:0 34px 72px rgb(2 24 20/.66),0 0 34px rgb(239 189 80/.3),0 0 64px rgb(87 142 91/.18); }
    .positions::before { background:linear-gradient(90deg,transparent,rgb(239 189 80/.62),transparent); }
    .position-label { color:#ffdfa0; background:rgb(8 42 37/.68); text-shadow:none; box-shadow:0 2px 12px rgb(2 24 20/.28); }
    .slot { width:min(100%,112px); border-color:rgb(239 189 80/.28); background:rgb(7 39 34/.36); box-shadow:inset 0 0 36px rgb(87 142 91/.08); }
    .slot-card { box-shadow:0 22px 52px rgb(2 24 20/.52),0 0 28px rgb(239 189 80/.13); }
    .command { color:#17362d; background:var(--gold); box-shadow:0 12px 30px rgb(2 24 20/.34); }
    .command::after { background:linear-gradient(45deg,var(--gold),rgb(93 145 91/.7),var(--gold)); }
    .command:hover { box-shadow:0 18px 40px rgb(2 24 20/.4),0 0 32px rgb(239 189 80/.18); }
    .quiet-command:hover { background:rgb(239 189 80/.08); }
    .actions { min-height:72px; gap:8px; padding-top:0; }
    .code-panel { border-color:rgb(239 189 80/.54); background:rgb(7 39 34/.9); box-shadow:inset 0 0 40px rgb(87 142 91/.08),0 24px 60px rgb(2 24 20/.45); }
    .code-label { color:#ffdfa0; text-shadow:none; }
    .code-note { color:#e1eadb; }
    .footer { border-color:rgb(239 189 80/.2); color:rgb(213 225 210/.68); }
    @keyframes forest-breathe { from { transform:translate3d(-.3%,0,0) scale(1.035); } to { transform:translate3d(.4%,-.2%,0) scale(1.05); } }
    @media (max-width:760px) { .shell{width:min(100% - 26px,640px);padding-top:10px}.scene{gap:10px;padding-top:8px}.title-column{justify-content:flex-start;padding-right:66px;text-align:left}h1{font-size:clamp(28px,8vw,40px)}.seal{top:8px}.sky{background-position:67% center}.position-label{padding:4px 5px;font-size:12px;letter-spacing:0;white-space:nowrap} }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
      #starfield { display: none; }
      .sky, .silk-veil, .wave-1, .wave-2, .wave-3 { animation: none; transform: none; }
    }
  </style>
</head>
<body>
  <div class="sky" aria-hidden="true"></div>
  <div class="silk-veil" aria-hidden="true"></div>
  <div class="wave-1" aria-hidden="true"></div>
  <div class="wave-2" aria-hidden="true"></div>
  <div class="wave-3" aria-hidden="true"></div>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">森林密语</div>
      <div class="status"><span id="statusText">等你准备好</span></div>
    </header>

    <section class="scene" aria-labelledby="questionTitle">
      <div class="title-column"><h1 id="questionTitle">先让心静下来，再选三张牌</h1></div>
      <div class="ritual">
        <div class="table">
          <button class="deck-stack" id="deckButton" type="button" aria-label="开始洗牌"><img src="images/card-back.jpg" alt="东方绢本风格塔罗牌背"></button>
          <div class="deck-rail" id="deckRail" aria-label="请选择三张牌"></div>
        </div>

        <div class="positions" aria-label="现状、阻力、方向三牌阵">
          <article class="position"><div class="position-label">此刻 · 正在发生</div><div class="slot" id="slot0"></div><div class="card-caption" id="caption0"></div></article>
          <article class="position"><div class="position-label">阻力 · 还没看清</div><div class="slot" id="slot1"></div><div class="card-caption" id="caption1"></div></article>
          <article class="position"><div class="position-label">方向 · 可以试试</div><div class="slot" id="slot2"></div><div class="card-caption" id="caption2"></div></article>
        </div>

        <div class="actions">
          <button class="command" id="primaryButton" type="button">开始洗牌</button>
          <div class="code-panel" id="codePanel">
            <div class="code-label">你的三张牌已经出现</div>
            <input class="draw-code" id="drawCode" type="text" readonly aria-label="抽牌码">
            <button class="command" id="copyButton" type="button">复制抽牌码</button>
            <div class="code-note" id="copyNote">复制后回到对话，我们一起读懂它们。</div>
          </div>
          <button class="quiet-command" id="resetButton" type="button" hidden>再抽一次</button>
        </div>
      </div>
      <aside class="seal" aria-label="三张行动牌阵">听<br>风<br>见<br>心</aside>
      <div id="liveStatus" class="sr-only" aria-live="polite"></div>
    </section>

    <footer class="footer"><span>问题和抽牌结果不会离开当前浏览器。</span><span>完整 78 张牌组，每次重新洗牌</span></footer>
  </main>

  <script src="deck-data.js"></script>
  <script src="tarot-codec.js"></script>
  <script>
    const deck = TarotDeck.cards;
    const positions = ["现状", "阻力", "方向"];
    const $ = selector => document.querySelector(selector);
    const deckButton = $("#deckButton"), deckRail = $("#deckRail"), primaryButton = $("#primaryButton"), resetButton = $("#resetButton");
    const codePanel = $("#codePanel"), drawCode = $("#drawCode"), copyButton = $("#copyButton"), copyNote = $("#copyNote");
    const statusText = $("#statusText"), liveStatus = $("#liveStatus");
    let state = "ready", shuffled = [], selected = [], energy = 0;
    let fanCards = [], activeFanIndex = -1, pendingFanX = 0, fanFrame = 0;

    function secureRandom(max) { if (!window.crypto?.getRandomValues) throw new Error("secure-random-unavailable"); const range = 0x100000000, limit = range - range % max, value = new Uint32Array(1); do window.crypto.getRandomValues(value); while (value[0] >= limit); return value[0] % max; }
    function secureShuffle(items) { const result = items.map(card => ({ ...card, reversed: secureRandom(2) === 1 })); for (let i = result.length - 1; i > 0; i--) { const j = secureRandom(i + 1); [result[i], result[j]] = [result[j], result[i]]; } return result; }
    function setStatus(text) { statusText.textContent = text; liveStatus.textContent = text; }

    function nearestAvailableIndex(index) {
      if (!fanCards.length) return -1;
      const target = Math.max(0, Math.min(fanCards.length - 1, index));
      if (!fanCards[target].classList.contains("is-used")) return target;
      for (let offset = 1; offset < fanCards.length; offset++) {
        const right = target + offset, left = target - offset;
        if (right < fanCards.length && !fanCards[right].classList.contains("is-used")) return right;
        if (left >= 0 && !fanCards[left].classList.contains("is-used")) return left;
      }
      return -1;
    }

    function baseFanZ(index) {
      const middle = (fanCards.length - 1) / 2;
      return String(Math.round(100 - Math.abs(index - middle)));
    }

    function layoutFan() {
      if (!fanCards.length || !deckRail.classList.contains("is-visible")) return;
      const railWidth = deckRail.clientWidth;
      const cardWidth = fanCards[0].offsetWidth;
      if (!railWidth || !cardWidth) return;
      const edgeInset = innerWidth <= 760 ? 8 : 0;
      const usable = Math.max(0, railWidth - cardWidth - edgeInset * 2), middle = (fanCards.length - 1) / 2;
      fanCards.forEach((button, index) => {
        const t = middle ? (index - middle) / middle : 0;
        button.style.setProperty("--fan-x", `${(-usable / 2) + (usable * index / Math.max(1, fanCards.length - 1))}px`);
        button.style.setProperty("--fan-y", `${Math.pow(Math.abs(t), 1.65) * 20}px`);
        button.style.setProperty("--fan-angle", `${t * 9}deg`);
        if (index !== activeFanIndex) button.style.zIndex = baseFanZ(index);
      });
    }

    function clearFanFocus() {
      activeFanIndex = -1;
      fanCards.forEach((button, index) => {
        button.classList.remove("is-active", "is-near");
        button.style.removeProperty("--focus-x");
        button.style.removeProperty("--lift");
        button.style.removeProperty("--fan-scale");
        button.style.zIndex = baseFanZ(index);
      });
    }

    function setFanFocus(index) {
      const available = nearestAvailableIndex(index);
      if (available < 0) { clearFanFocus(); return -1; }
      if (available === activeFanIndex) return available;
      activeFanIndex = available;
      fanCards.forEach((button, cardIndex) => {
        const distance = cardIndex - available, absolute = Math.abs(distance);
        const influence = Math.max(0, 1 - absolute / 5);
        const push = absolute ? Math.sign(distance) * 38 * Math.pow(influence, 1.35) : 0;
        button.classList.toggle("is-active", absolute === 0);
        button.classList.toggle("is-near", absolute > 0 && absolute < 5);
        button.style.setProperty("--focus-x", `${push}px`);
        button.style.setProperty("--lift", `${absolute === 0 ? 38 : 10 * influence}px`);
        button.style.setProperty("--fan-scale", `${absolute === 0 ? 1.08 : 1 + .018 * influence}`);
        button.style.zIndex = absolute < 5 ? String(200 - absolute) : baseFanZ(cardIndex);
      });
      return available;
    }

    function fanIndexFromPointer(clientX) {
      const rect = deckRail.getBoundingClientRect();
      if (!rect.width) return 0;
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return Math.round(ratio * (fanCards.length - 1));
    }

    function focusFanCard(index) {
      const available = setFanFocus(index);
      if (available < 0) return;
      fanCards.forEach((button, cardIndex) => { button.tabIndex = cardIndex === available ? 0 : -1; });
      fanCards[available].focus();
    }

    function renderRail() {
      deckRail.replaceChildren();
      shuffled.forEach((card, index) => {
        const button = document.createElement("button");
        button.type = "button"; button.className = "draw-card"; button.dataset.index = index;
        button.setAttribute("aria-label", `选择第 ${index + 1} 张牌`); button.setAttribute("aria-pressed", "false"); button.tabIndex = index === 0 ? 0 : -1;
        button.addEventListener("focus", () => setFanFocus(index));
        button.addEventListener("click", event => { if (event.detail === 0) { const next = chooseCard(index, button); if (next >= 0 && selected.length < 3) focusFanCard(next); } });
        button.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            const next = chooseCard(index, button);
            if (next >= 0 && selected.length < 3) focusFanCard(next);
            return;
          }
          let target = -1;
          if (event.key === "ArrowLeft") target = index - 1;
          if (event.key === "ArrowRight") target = index + 1;
          if (event.key === "Home") target = 0;
          if (event.key === "End") target = fanCards.length - 1;
          if (target >= 0) { event.preventDefault(); focusFanCard(target); }
        });
        deckRail.append(button);
      });
      fanCards = [...deckRail.children]; activeFanIndex = -1;
    }

    function beginShuffle() {
      if (state !== "ready") return;
      try { shuffled = secureShuffle(deck); } catch { setStatus("当前浏览器无法安全抽牌"); primaryButton.textContent = "请换用较新的浏览器"; primaryButton.disabled = true; return; }
      state = "shuffling"; energy = 1; document.body.classList.add("is-shuffling"); setStatus("微风掠过牌面，正在洗牌"); primaryButton.disabled = true; deckButton.classList.add("is-shuffling");
      const delay = matchMedia("(prefers-reduced-motion: reduce)").matches ? 20 : 1580;
      setTimeout(() => { renderRail(); deckButton.hidden = true; deckRail.classList.add("is-visible"); requestAnimationFrame(layoutFan); state = "drawing"; energy = .28; document.body.classList.remove("is-shuffling"); setStatus("别想太久，凭第一感觉选择"); primaryButton.textContent = "再选三张"; }, delay);
    }

    function chooseCard(index, button) {
      if (state !== "drawing" || selected.some(item => item.index === index) || selected.length >= 3) return -1;
      const card = shuffled[index]; selected.push({ ...card, index }); button.classList.add("is-selected", "is-used"); button.setAttribute("aria-pressed", "true");
      const slotIndex = selected.length - 1, slot = $(`#slot${slotIndex}`), back = document.createElement("div"); back.className = "slot-card"; back.style.background = '#160c24 url("images/card-back.jpg") center / cover'; back.setAttribute("aria-label", `${positions[slotIndex]}牌位已选择，尚未翻开`); slot.append(back);
      const remaining = 3 - selected.length; primaryButton.textContent = remaining ? `再选${remaining === 2 ? "两" : "一"}张` : "翻开三张牌"; primaryButton.disabled = remaining !== 0; setStatus(remaining ? `已经选了${selected.length}张` : "三张牌都选好了");
      if (!remaining) { clearFanFocus(); return -1; }
      const next = nearestAvailableIndex(index + 1 < fanCards.length ? index + 1 : index - 1); setFanFocus(next); return next;
    }

    function revealCards() {
      if (state !== "drawing" || selected.length !== 3) return; state = "revealed"; energy = .72;
      selected.forEach((card, index) => { const slot = $(`#slot${index}`); slot.replaceChildren(); const face = document.createElement("div"); face.className = `slot-card${card.reversed ? " is-reversed" : ""}`; face.style.animationDelay = `${index * 150}ms`; const img = document.createElement("img"); img.src = `images/cards/${card.file}`; img.alt = `${card.name}${card.reversed ? "逆位" : "正位"}`; face.append(img); slot.append(face); $(`#caption${index}`).innerHTML = `${card.name}<span>${card.reversed ? "逆位" : "正位"}</span>`; });
      drawCode.value = TarotCodec.encode("S3", selected);
      deckRail.hidden = true; primaryButton.hidden = true; codePanel.classList.add("is-visible"); resetButton.hidden = false; state = "code-ready"; setStatus("牌已翻开"); setTimeout(() => { energy = .18; copyButton.focus(); }, 900);
    }

    async function copyResult() { try { await navigator.clipboard.writeText(drawCode.value); copyButton.textContent = "已复制"; copyNote.textContent = "回到对话吧，我们一起看看这些牌。"; } catch { drawCode.focus(); drawCode.select(); copyButton.textContent = "请手动复制"; copyNote.textContent = "抽牌码已经为你选中。"; } }
    function reset() { state = "ready"; shuffled = []; selected = []; energy = 0; clearFanFocus(); fanCards = []; deckRail.className = "deck-rail"; deckRail.hidden = false; deckRail.replaceChildren(); deckButton.hidden = false; deckButton.classList.remove("is-shuffling"); primaryButton.hidden = false; primaryButton.disabled = false; primaryButton.textContent = "开始洗牌"; codePanel.classList.remove("is-visible"); resetButton.hidden = true; copyButton.textContent = "复制抽牌码"; copyNote.textContent = "复制后回到对话，我们一起读懂它们。"; for (let i = 0; i < 3; i++) { $(`#slot${i}`).replaceChildren(); $(`#caption${i}`).textContent = ""; } setStatus("等你准备好"); deckButton.focus(); }

    deckButton.addEventListener("click", beginShuffle); primaryButton.addEventListener("click", () => state === "ready" ? beginShuffle() : revealCards()); copyButton.addEventListener("click", copyResult); resetButton.addEventListener("click", reset);
    deckRail.addEventListener("pointermove", event => {
      if (state !== "drawing") return;
      pendingFanX = event.clientX;
      if (!fanFrame) fanFrame = requestAnimationFrame(() => { fanFrame = 0; setFanFocus(fanIndexFromPointer(pendingFanX)); });
    });
    deckRail.addEventListener("pointerdown", event => { if (state === "drawing") setFanFocus(fanIndexFromPointer(event.clientX)); });
    deckRail.addEventListener("pointerleave", event => { if (event.pointerType !== "touch" && state === "drawing") clearFanFocus(); });
    deckRail.addEventListener("click", event => {
      if (state !== "drawing" || event.detail === 0) return;
      const index = setFanFocus(fanIndexFromPointer(event.clientX));
      if (index >= 0) chooseCard(index, fanCards[index]);
    });
    if ("ResizeObserver" in window) new ResizeObserver(layoutFan).observe(deckRail); else addEventListener("resize", layoutFan, { passive: true });

    if (!matchMedia("(prefers-reduced-motion: reduce)").matches) {
      document.addEventListener("pointermove", event => { document.documentElement.style.setProperty("--px", ((event.clientX / innerWidth) - .5).toFixed(3)); document.documentElement.style.setProperty("--py", ((event.clientY / innerHeight) - .5).toFixed(3)); }, { passive: true });
      const canvas = $("#starfield"), ctx = canvas.getContext("2d"); let stars = [], raf = 0, running = true;
      function resize() { const dpr = Math.min(devicePixelRatio || 1, 1.6); canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr; canvas.style.width = `${innerWidth}px`; canvas.style.height = `${innerHeight}px`; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); stars = Array.from({ length: Math.min(64, Math.floor(innerWidth / 18)) }, (_, i) => ({ angle: Math.random() * Math.PI * 2, radius: .16 + Math.random() * .38, speed: .00008 + Math.random() * .00012, size: .45 + Math.random() * 1.2, lane: i % 3 })); }
      function draw(time) { if (!running) return; ctx.clearRect(0, 0, innerWidth, innerHeight); const cx = innerWidth * .5, cy = innerHeight * .44, rx = innerWidth * (.34 - energy * .08), ry = innerHeight * (.2 - energy * .04); stars.forEach(star => { const a = star.angle + time * star.speed * (1 + energy * 3); const x = cx + Math.cos(a) * rx * (star.radius + .66), y = cy + Math.sin(a) * ry * (star.radius + .65); ctx.beginPath(); ctx.fillStyle = star.lane === 0 ? `rgba(239,189,80,${.18 + energy * .34})` : `rgba(188,221,176,${.14 + energy * .22})`; ctx.arc(x, y, star.size + energy * .45, 0, Math.PI * 2); ctx.fill(); }); raf = requestAnimationFrame(draw); }
      resize(); addEventListener("resize", resize, { passive: true }); document.addEventListener("visibilitychange", () => { running = !document.hidden; if (running) raf = requestAnimationFrame(draw); else cancelAnimationFrame(raf); }); raf = requestAnimationFrame(draw);
    }
  </script>
</body>
</html>
